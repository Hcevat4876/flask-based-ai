    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --neon-blue: #00f2ff;
    --neon-pink: #ff00c1;
    --bg: #0a0a12;
    --sidebar-bg: #0d0d18;
    --border: rgba(255,255,255,0.07);
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(0,242,255,0.3); border-radius: 2px; }
body {
    background: var(--bg); color: #ccc;
    font-family: 'Fira Code', monospace;
    height: 100vh; 
    height: 100dvh; 
    display: flex; 
    overflow: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 240px; min-width: 240px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 14px;
    transition: transform 0.3s ease;
    z-index: 100;
}

.logo-mark {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}
.logo-icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,242,255,0.2), rgba(255,0,193,0.2));
    border: 1px solid rgba(0,242,255,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--neon-blue); font-size: 14px;
}
.logo-text { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--neon-blue); letter-spacing: 3px; }
.logo-sub { font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

.user-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
}
.user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,242,255,0.3), rgba(188,0,255,0.3));
    border: 1px solid rgba(0,242,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--neon-blue); flex-shrink: 0;
}
.user-name { font-size: 13px; color: #eee; font-weight: 500; }
.user-rank { font-size: 9px; color: rgba(0,242,255,0.5); letter-spacing: 1px; }
.online-dot { display: flex; align-items: center; gap: 5px; margin-top: 6px; font-size: 9px; color: #00ff88; }
.dot-green { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 5px #00ff88; }

.monitor-title { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.2); margin-bottom: 12px; text-transform: uppercase; }
.monitor-item { margin-bottom: 14px; }
.monitor-label { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.monitor-val { color: rgba(255,255,255,0.7); }
.prog-bg { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.prog-blue { background: var(--neon-blue); box-shadow: 0 0 6px var(--neon-blue); }
.prog-pink { background: var(--neon-pink); box-shadow: 0 0 6px var(--neon-pink); }

.sidebar-nav { margin-top: auto; display: flex; flex-direction: column; gap: 2px; }
.nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 6px;
    font-size: 11px; color: rgba(255,255,255,0.35);
    cursor: pointer; transition: all 0.2s; text-decoration: none;
    border: 1px solid transparent;
}
.nav-item i { width: 14px; text-align: center; }
.nav-item:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); border-color: var(--border); }
.nav-item.download-apk { color: var(--neon-blue); background: rgba(0,242,255,0.03); border-color: rgba(0,242,255,0.1); }
.nav-item.download-apk:hover { color: #fff; background: rgba(0,242,255,0.1); border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(0,242,255,0.2); }
.nav-item.danger:hover { color: #ff4444; background: rgba(255,68,68,0.06); border-color: rgba(255,68,68,0.15); }

/* MAIN */
main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; }

.topbar {
    height: 48px; min-height: 48px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: rgba(10,10,18,0.8);
}
.mobile-toggle { display: none; background: none; border: none; color: var(--neon-blue); font-size: 18px; cursor: pointer; }

.status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.35); }
.status-dot-sm { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 5px #00ff88; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0.5;} }
.topbar-clock { font-size: 10px; color: rgba(255,255,255,0.2); }

/* CHAT AREA & MESSAGES */
#chat-container { flex: 1; overflow-y: auto; padding: 0 20px; display: flex; flex-direction: column; }
.welcome-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px 0; }
.welcome-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(0,242,255,0.15), rgba(188,0,255,0.15));
    border: 1px solid rgba(0,242,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--neon-blue); box-shadow: 0 0 20px rgba(0,242,255,0.1);
}
.welcome-title { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 6px; color: var(--neon-blue); text-shadow: 0 0 15px rgba(0,242,255,0.3); }
.welcome-sub { font-size: 12px; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.7; max-width: 360px; }

.chat-msgs { display: flex; flex-direction: column; gap: 20px; padding: 28px 0; }

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg-wrap { 
    display: flex; flex-direction: column; max-width: 90%; 
    animation: fadeInUp 0.4s ease-out forwards; 
}
.msg-wrap.user { align-self: flex-end; }
.msg-wrap.ai { align-self: flex-start; width: 85%; }
.msg-meta { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.2); margin-bottom: 5px; text-transform: uppercase; }
.msg-wrap.user .msg-meta { text-align: right; }

.msg { padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6; word-break: break-word; position: relative; }
.msg.user {
    background: rgba(0,242,255,0.07); border: 1px solid rgba(0,242,255,0.2);
    color: #e8f8ff; border-radius: 10px 10px 2px 10px; white-space: pre-wrap;
}
.msg.ai {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: #ddd; border-radius: 10px 10px 10px 2px;
}

/* INPUT */
.input-area { padding: 16px 20px 24px; flex-shrink: 0; }
.input-box {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; display: flex; align-items: center; gap: 8px; padding: 8px 10px;
}
#userInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: #eee; font-family: 'Fira Code', monospace; font-size: 13px; padding: 6px 4px;
}
#sendBtn {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    background: var(--neon-blue); border: none; border-radius: 8px; color: #000;
    font-size: 14px; cursor: pointer; transition: all 0.25s;
}

/* MOBILE MEDIA QUERIES */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
    }
    .sidebar.active { transform: translateX(0); }
    .mobile-toggle { display: block; margin-right: 15px; }
    .topbar-clock { display: none; }
    .msg-wrap { max-width: 95%; }
    .msg-wrap.ai { width: 95%; }
    
    .sidebar-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
        z-index: 90;
    }
    .sidebar-overlay.active { display: block; }
}

.typing::after { content: '_'; display: inline-block; color: var(--neon-blue); animation: blink 0.7s infinite; margin-left: 3px; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

pre { padding: 14px; overflow-x: auto; margin: 0; }
code { font-family: 'Fira Code', monospace !important; font-size: 12px !important; }

#admin-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
#admin-overlay.show { display: flex; }
.admin-box { background: rgba(8,8,20,0.98); border: 1px solid var(--neon-pink); border-radius: 10px; padding: 40px; text-align: center; color: #fff; }
#fileInput { display: none; }
</style>
</head>
<body>

<div id="admin-overlay">
    <div class="admin-box">
        <div class="admin-box-title" style="color:var(--neon-pink); letter-spacing:2px; margin-bottom:15px; font-weight: bold;">⚠ SİSTEM MESAJI</div>
        <div id="admin-box-msg" style="margin-bottom:20px; font-size: 14px; line-height: 1.5;"></div>
        <button onclick="document.getElementById('admin-overlay').classList.remove('show')" style="padding:8px 20px; background:transparent; border:1px solid var(--neon-pink); color:var(--neon-pink); cursor:pointer; font-family: 'Orbitron'; font-size: 11px;">TAMAM</button>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo-mark">
        <div class="logo-icon"><i class="fas fa-brain"></i></div>
        <div><div class="logo-text">DABI</div><div class="logo-sub">Yarap Zeka</div></div>

    <div class="user-card">

    </div>
    <nav class="sidebar-nav">
        <a href="#" class="nav-item" onclick="wipeMemory()"><i class="fas fa-trash"></i> Mesajları Sil</a>
        <a href="#" class="nav-item" onclick="const e='info@dabi.com.tr'; const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); if(isIOS){window.location.href='googlegmail:///co?to='+e; setTimeout(()=>{window.location.href='mailto:'+e},2000)}else if(!/Android|Mobi/i.test(navigator.userAgent)){window.open('https://mail.google.com/mail/?view=cm&fs=1&to='+e,'_blank')}else{window.location.href='mailto:'+e} navigator.clipboard.writeText(e); this.querySelector('span').innerText='Kopyalandı!'; setTimeout(()=>this.querySelector('span').innerText=e,2000); return false;"><i class="fas fa-envelope"></i> <span>info@dabi.com.tr</span></a>
        <a href="/logout" class="nav-item danger"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>

<main>
    <div class="topbar">
        <div style="display: flex; align-items: center;">

            <input type="text" id="userInput" placeholder="Command DABI..." autocomplete="off" autofocus>
            <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>

    </div>

<script>
window.onpageshow = function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        window.location.reload();
    }
};

async function checkAuth() {
    try {
        const res = await fetch('/status_check');
        const data = await res.json();
        if (data.action === 'banned' || !res.ok) {
            window.location.replace('/login');
        }
    } catch(e) {
        window.location.replace('/login');
    }
}
checkAuth();

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebarOverlay').classList.toggle('active');
}

const chatMsgs = document.getElementById('chat-msgs');
const welcomeState = document.getElementById('welcome-state');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
let pendingFileContent = '';
let pendingFileName = '';
let hasMessages = false;

window.onload = async () => {
    try {
        const res = await fetch('/get_history');
        const hist = await res.json();
        if (hist && hist.length > 0) {
            showChat();
            for (const item of hist) {
                appendMsg('user', item.user, false);
                appendMsg('ai', item.ai, false);
            }
            scrollBottom();
        }
    } catch(e) { console.error("History error"); }
    statusLoop();
};

async function statusLoop() {
    try {
        const r = await fetch('/status_check?t=' + Date.now());
        const d = await r.json();
        if (d.action === 'message' && d.message) {
            document.getElementById('admin-box-msg').textContent = d.message;
            document.getElementById('admin-overlay').classList.add('show');
            fetch('/clear_admin_message', {method: 'POST'});
        }
        if (d.action === 'banned') window.location.href = '/logout';
    } catch(e) {}
    setTimeout(statusLoop, 3000);
}

setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR'); }, 1000);
setInterval(() => {
    const cpu = Math.floor(Math.random() * 30 + 20);
    const mem = Math.floor(Math.random() * 15 + 60);
    document.getElementById('cpu-bar').style.width = cpu + '%';
    document.getElementById('cpu-val').textContent = cpu + '%';
    document.getElementById('mem-bar').style.width = mem + '%';
    document.getElementById('mem-val').textContent = mem + '%';
}, 5000);

function showChat() {
    welcomeState.style.display = 'none';
    chatMsgs.style.display = 'flex';
    hasMessages = true;
}

// Güvenli HTML Kaçırma Fonksiyonu (HTML etiketlerini tamamen düz yazıya dönüştürür)
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

// Yapay Zeka Mesajlarını Güvenli Bir Şekilde Düzenleyen Fonksiyon
function renderContent(text) {
    const codeBlocks = [];
    
    // Markdown formatındaki kod bloklarını esnek ve güvenli bir şekilde yakalayan regex
    const codeBlockRegex = /```(html|css|js|javascript|python|bash|sh|json|sql|cpp|c|xml)?\s*([\s\S]*?)```/g;
    
    // Kod bloklarını marked.js dönüştürmeden önce güvenli geçici kelimelerle yedekliyoruz
    let processedText = text.replace(codeBlockRegex, (match, lang, code) => {
        const placeholder = `DABICODEBLOCKPLACEHOLDER${codeBlocks.length}`;
        codeBlocks.push({ lang: lang || 'code', code: code });
        return placeholder;
    });
    
    // Kod dışındaki alanları temizleyip markdown derleyicisinden geçiriyoruz
    processedText = escapeHTML(processedText);
    let htmlOutput = typeof marked !== 'undefined' ? marked.parse(processedText) : processedText;
    
    // Yedeklenen kod bloklarını şık arayüz kutularıyla geri yerleştiriyoruz
    codeBlocks.forEach((block, idx) => {
        const placeholder = `DABICODEBLOCKPLACEHOLDER${idx}`;
        const langLower = block.lang.toLowerCase();
        const isHTML = ['html', 'css', 'js', 'javascript'].includes(langLower);
        const escapedCode = escapeHTML(block.code.trim());
        
        const codeContainerHTML = `
            <div class="code-container" style="margin: 15px 0; background: #15161e; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; text-align: left;">
                <div class="code-header" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: rgba(255,255,255,0.03); font-size: 11px; color: var(--neon-blue); border-bottom: 1px solid var(--border);">
                    <span style="font-family: 'Orbitron', sans-serif; letter-spacing: 1px;"><i class="fas fa-code"></i> ${block.lang.toUpperCase()}</span>
                    <div class="code-actions" style="display: flex; gap: 15px;">
                        <span class="code-btn" onclick="copyCode(this)" style="cursor: pointer; color: rgba(255,255,255,0.4); transition: 0.2s; display: flex; align-items: center; gap: 5px;"><i class="fas fa-copy"></i> Kopyala</span>
                        ${isHTML ? `<span class="code-btn" onclick="togglePreview(this)" style="cursor: pointer; color: rgba(255,255,255,0.4); transition: 0.2s; display: flex; align-items: center; gap: 5px;"><i class="fas fa-eye"></i> Önizleme</span>` : ''}
                    </div>
                </div>
                <pre style="padding: 14px; overflow-x: auto; margin: 0; background: #1a1b26;"><code class="language-${block.lang === 'js' ? 'javascript' : block.lang}">${escapedCode}</code></pre>
                <div class="raw-code-holder" style="display:none;">${escapedCode}</div>
                <iframe class="preview-box" sandbox="allow-scripts" style="background: white; width: 100%; height: 350px; border: none; border-top: 1px solid var(--border); display: none;"></iframe>
            </div>
        `;
        
        htmlOutput = htmlOutput.replace(placeholder, codeContainerHTML);
    });
    
    return htmlOutput;
}

function togglePreview(btn) {
    const container = btn.closest('.code-container');
    const iframe = container.querySelector('.preview-box');
    
    // Gizli alandaki güvenli şekilde kodlanmış veriyi geri çözüyoruz (iframe içinde ham HTML çalışabilmesi için)
    let rawCodeEscaped = container.querySelector('.raw-code-holder').innerHTML;
    let rawCode = rawCodeEscaped
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/&quot;/g, '"')
        .replace(/&#39;/g, "'");
    
    if (iframe.style.display === 'block') {
        iframe.style.display = 'none';
        btn.innerHTML = '<i class="fas fa-eye"></i> Önizleme';
    } else {
        iframe.style.display = 'block';
        iframe.srcdoc = rawCode; // Kod tamamen güvenli ve izole iframe içinde çalışır.
        btn.innerHTML = '<i class="fas fa-eye-slash"></i> Kapat';
    }
}

async function appendMsg(sender, text, typeEffect = true) {
    if (!hasMessages) showChat();
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${sender}`;
    const meta = sender === 'user' ? 'YOU' : 'DABI';
    wrap.innerHTML = `<div class="msg-meta">${meta}</div><div class="msg ${sender}"></div>`;
    chatMsgs.appendChild(wrap);
    const msgEl = wrap.querySelector('.msg');

    if (sender === 'user') {
        // KULLANICI GİRDİLERİ KESİNLİKLE textContent OLARAK BASILIR (HTML asla çalışmaz!)
        msgEl.textContent = text;
        scrollBottom();
    } else if (!typeEffect) {
        // Eski sohbet geçmişi yüklenirken direkt render edilir
        msgEl.innerHTML = renderContent(text);
        msgEl.querySelectorAll('pre code').forEach((el) => { 
            if(typeof hljs !== 'undefined') hljs.highlightElement(el); 
        });
        scrollBottom();
    } else {
        // Canlı yazma efekti
        msgEl.classList.add('typing');
        let i = 0;
        const speed = 10; 
        
        return new Promise(resolve => {
            function type() {
                if (i < text.length) {
                    // Yazma anında metni anlık olarak renderContent motorundan geçiriyoruz
                    const partialText = text.substring(0, i + 1);
                    msgEl.innerHTML = renderContent(partialText);
                    
                    // Yazma esnasında oluşan/büyüyen kod bloklarını anlık olarak renklendir
                    msgEl.querySelectorAll('pre code').forEach((el) => { 
                        if(typeof hljs !== 'undefined') hljs.highlightElement(el); 
                    });

                    i += 2; 
                    scrollBottom();
                    setTimeout(type, speed);
                } else {
                    // Yazma tamamen bittiğinde son kez temiz ve eksiksiz render yapılıyor
                    msgEl.innerHTML = renderContent(text);
                    msgEl.querySelectorAll('pre code').forEach((el) => { 
                        if(typeof hljs !== 'undefined') hljs.highlightElement(el); 
                    });
                    msgEl.classList.remove('typing');
                    scrollBottom();
                    resolve();
                }
            }
            type();
        });
    }
}
async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !pendingFileContent) return;
    sendBtn.disabled = true;
    const displayText = pendingFileName ? `[File: ${pendingFileName}]\n${text}` : text;
    appendMsg('user', displayText, false);
    inputEl.value = '';
    const fc = pendingFileContent;
    clearFile();

    const loadWrap = document.createElement('div');
    loadWrap.className = 'msg-wrap ai';
    loadWrap.innerHTML = `<div class="msg-meta">DABI</div><div class="msg ai"><i class="fas fa-circle-notch fa-spin"></i> Processing...</div>`;
    chatMsgs.appendChild(loadWrap);
    scrollBottom();

    try {
        const res = await fetch('/ask', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: text, file_content: fc})
        });
        const data = await res.json();
        loadWrap.remove();
        await appendMsg('ai', data.response, true); 
    } catch(e) {
        loadWrap.querySelector('.msg').innerHTML = '<span style="color:#ff4444">ERROR: NEURAL LINK TIMEOUT</span>';
    }
    sendBtn.disabled = false;
}

function copyCode(btn) {
    const code = btn.closest('.code-container').querySelector('code').innerText;
    // iframe sınırlandırmalarına karşı kopyalama alternatifi
    const tempTextarea = document.createElement('textarea');
    tempTextarea.value = code;
    document.body.appendChild(tempTextarea);
    tempTextarea.select();
    document.execCommand('copy');
    document.body.removeChild(tempTextarea);

    btn.innerHTML = '<i class="fas fa-check"></i> Kopyalandı!';
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Kopyala'; }, 2000);
}

function scrollBottom() { const c = document.getElementById('chat-container'); c.scrollTop = c.scrollHeight; }

async function wipeMemory() {
    try {
        await fetch('/reset', { method: 'POST' });
        window.location.href = window.location.origin + window.location.pathname + '?cache_bust=' + Date.now();
    } catch(e) {
        console.error("Silme hatası:", e);
    }
}
    
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

async function handleFile(el) {
    const file = el.files[0]; if (!file) return;
    const fd = new FormData(); fd.append('file', file);
    const res = await fetch('/upload_file', {method: 'POST', body: fd});
    const data = await res.json();
    if (data.success) {
        pendingFileContent = data.content; pendingFileName = data.filename;
        document.getElementById('file-preview').innerHTML = `<div style="color:var(--neon-blue); font-size:11px; margin-bottom:10px;"><i class="fas fa-file"></i> ${data.filename} <span onclick="clearFile()" style="cursor:pointer; color:red; margin-left:10px;">X</span></div>`;
    }
}
function clearFile() { pendingFileContent = ''; pendingFileName = ''; document.getElementById('file-preview').innerHTML = ''; }

if (!window.location.hash) {
    window.history.replaceState(null, null, window.location.pathname + '/#');
    const icons = document.querySelectorAll("link[rel*='icon']");
    icons.forEach(icon => {
        const originalHref = icon.href.split('?')[0];
        icon.href = originalHref + '?t=' + new Date().getTime();
    });
}
</script>
